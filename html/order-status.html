<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отслеживание заказа</title>
  <link rel="stylesheet" href="/css/style.css">
  
  <!-- Яндекс.Карты API - ВАШ РЕАЛЬНЫЙ КЛЮЧ ЗДЕСЬ -->
  <script src="https://api-maps.yandex.ru/2.1/?apikey=4b9a5ed5-9134-4a58-85de-390193dbe3a4&lang=ru_RU" type="text/javascript"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #141414;
      color: #ffffff;
      min-height: 100vh;
      padding: 30px;
      padding-top: 140px;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    .container {
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Шапка страницы */
    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }

    /* Main Content - основной контейнер */
    .main-content {
      display: flex;
      gap: 24px;
      width: 100%;
    }

    /* Карта - основной элемент */
    .map-wrapper {
      flex: 1;
      min-width: 0;
    }

    .map-container {
      width: 100%;
      height: 500px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Панель управления - справа */
    .control-panel {
      width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Карточки панели */
    .panel-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
    }

    .panel-card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      height: 42px;
      background: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 14px;
      color: #000000;
      cursor: pointer;
    }

    .form-group select option {
      background: #ffffff;
      color: #000000;
      padding: 10px;
    }

    .form-group input::placeholder {
      color: rgba(0, 0, 0, 0.5);
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    /* Кнопки */
    .btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Прогресс */
    .progress-section {
      margin-top: 8px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 4px;
      transition: width 0.5s;
    }

    /* Статус */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      margin-top: 16px;
    }

    .status-icon {
      width: 40px;
      height: 40px;
      background: rgba(102, 126, 234, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-text {
      font-size: 14px;
      font-weight: 500;
    }

    /* Информация о маршруте */
    .route-info {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .route-info.active {
      display: grid;
    }

    .route-item {
      text-align: center;
    }

    .route-value {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }

    .route-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Назад кнопка */
    .back-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #667eea;
    }

    /* Адаптив для планшетов */
    @media (max-width: 1024px) {
      body {
        padding: 24px;
        padding-top: 130px;
      }

      .main-content {
        gap: 20px;
      }

      .map-container {
        height: 400px;
      }

      .control-panel {
        width: 300px;
      }
    }

    /* Адаптив для мобильных */
    @media (max-width: 768px) {
      body {
        padding: 16px;
        padding-top: 120px;
      }

      .page-header h1 {
        font-size: 22px;
      }

      .main-content {
        flex-direction: column;
      }

      .map-container {
        height: 300px;
      }

      .control-panel {
        width: 100%;
      }

      .route-info {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* Адаптив для маленьких мобильных */
    @media (max-width: 480px) {
      body {
        padding: 12px;
        padding-top: 100px;
      }

      .map-container {
        height: 250px;
      }

      .panel-card {
        padding: 16px;
      }

      .page-header h1 {
        font-size: 20px;
      }
    }

    /* Стили шапки */
    .navbar-wrap {
      top: 15px;
    }

    @media (max-width: 768px) {
      .navbar-wrap {
        top: 8px;
        padding: 0 12px;
      }
      
      .navbar-logo-link svg {
        width: 180px;
        height: auto;
      }
      
      .navbar {
        padding: 0 12px;
        height: 42px;
      }
      
      .navbar-menu {
        gap: 12px;
      }
      
      .navbar-menu li a {
        font-size: 11px;
      }
    }

    @media (max-width: 480px) {
      .navbar-wrap {
        padding: 0 8px;
      }
      
      .navbar-logo-link svg {
        width: 140px;
      }
      
      .navbar {
        height: 38px;
        padding: 0 10px;
      }
      
      .navbar-menu li a {
        font-size: 9px;
      }
      
      .navbar-profile svg {
        width: 22px;
        height: 22px;
      }
    }
  </style>
</head>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <div id="loader-text">Загрузка...</div>
    </div>
  </div>

  <div class="container">
    <!-- Заголовок страницы -->
    <div class="page-header">
      <h1>Отслеживание заказа</h1>
    </div>

    <!-- Основной контент -->
    <div class="main-content">
      <!-- Карта -->
      <div class="map-wrapper">
        <div class="map-container">
          <div id="map"></div>
        </div>
      </div>

      <!-- Панель управления -->
      <div class="control-panel">
        <!-- Выбор заказа -->
        <div class="panel-card" id="orderSelector">
          <h3>Выберите заказ</h3>
          <div class="form-group">
            <select id="orderSelect">
              <option value="">Загрузка заказов...</option>
            </select>
          </div>
        </div>
        
        <div class="no-orders" id="noOrders" style="display: none;">
          <p>У вас пока нет заказов</p>
          <p><a href="/html/order.html">Создать заказ</a></p>
        </div>

        <!-- Детали заказа -->
        <div class="panel-card" id="orderDetails" style="display: none;">
          <h3>Маршрут</h3>
          <div class="form-group">
            <label>Откуда</label>
            <input type="text" 
                   id="start-point" 
                   placeholder="Адрес отправления"
                   value="Минск, вокзал">
          </div>

          <div class="form-group">
            <label>Куда</label>
            <input type="text" 
                   id="end-point" 
                   placeholder="Адрес доставки"
                   value="Минск, Национальная библиотека">
          </div>

          <div class="form-group">
            <label>Транспорт</label>
            <select id="route-type">
              <option value="auto">На машине</option>
              <option value="pedestrian">Пешком</option>
              <option value="masstransit">Общественный транспорт</option>
            </select>
          </div>

          <button class="btn btn-primary" id="build-route">
            Построить маршрут
          </button>

          <div class="route-info" id="route-info">
            <div class="route-item">
              <div class="route-value" id="distance">—</div>
              <div class="route-label">Расстояние</div>
            </div>
            <div class="route-item">
              <div class="route-value" id="duration">—</div>
              <div class="route-label">Время</div>
            </div>
          </div>

          <div class="progress-section">
            <div class="progress-label">
              <span>Статус доставки</span>
              <span id="progress-text">70%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: 70%"></div>
            </div>
          </div>
        </div>

        <!-- Статус -->
        <div class="status-bar">
          <div class="status-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
          <div class="status-text" id="status-text">Курьер в пути</div>
        </div>

        <!-- Кнопка назад -->
        <a class="back-link" href="/html/profile.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          Вернуться в профиль
        </a>
      </div>

  <script>
    // Глобальные переменные
    let map = null;
    let multiRoute = null;
    let startPlacemark = null;
    let endPlacemark = null;
    let orders = [];

    // Загрузка заказов при загрузке страницы
    document.addEventListener('DOMContentLoaded', async function() {
      const token = localStorage.getItem('token');
      
      if (!token) {
        document.getElementById('orderSelector').style.display = 'none';
        document.getElementById('noOrders').style.display = 'block';
        document.getElementById('noOrders').innerHTML = '<p>Пожалуйста, войдите в систему</p><p><a href="/index.html">Войти</a></p>';
        return;
      }
      
      try {
        const response = await fetch('http://localhost:5000/api/orders', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (response.ok) {
          const data = await response.json();
          orders = data.data.orders;
          
          const orderSelect = document.getElementById('orderSelect');
          orderSelect.innerHTML = '<option value="">Выберите заказ</option>';
          
          if (orders.length === 0) {
            document.getElementById('orderSelector').style.display = 'none';
            document.getElementById('noOrders').style.display = 'block';
          } else {
            orders.forEach(order => {
              const option = document.createElement('option');
              option.value = order.id;
              option.textContent = `Заказ #${order.id} - ${order.pickupAddress} → ${order.deliveryAddress}`;
              orderSelect.appendChild(option);
            });
            
            // Проверяем, есть ли последний созданный заказ
            const lastOrderId = localStorage.getItem('lastOrderId');
            if (lastOrderId) {
              orderSelect.value = lastOrderId;
              localStorage.removeItem('lastOrderId');
              loadOrderDetails(lastOrderId);
            }
          }
        }
      } catch (error) {
        console.error('Ошибка загрузки заказов:', error);
      }
    });

    // Обработчик выбора заказа
    document.addEventListener('DOMContentLoaded', function() {
      const orderSelect = document.getElementById('orderSelect');
      if (orderSelect) {
        orderSelect.addEventListener('change', function() {
          const orderId = this.value;
          if (orderId) {
            loadOrderDetails(orderId);
          }
        });
      }
    });

    // Загрузка деталей заказа
    function loadOrderDetails(orderId) {
      const order = orders.find(o => o.id == orderId);
      if (!order) return;
      
      // Заполняем поля формы данными из заказа
      document.getElementById('start-point').value = order.pickupAddress || '';
      document.getElementById('end-point').value = order.deliveryAddress || '';
      
      // Показываем детали заказа
      document.getElementById('orderDetails').style.display = 'block';
      
      // Обновляем статус
      const statusText = document.getElementById('status-text');
      if (order.status === 'pending') {
        statusText.textContent = 'Заказ ожидает обработки';
      } else if (order.status === 'in_progress') {
        statusText.textContent = 'Заказ в пути';
      } else if (order.status === 'delivered') {
        statusText.textContent = 'Заказ доставлен';
      }
      
      // Автоматически строим маршрут
      setTimeout(() => {
        buildRoute();
      }, 500);
    }

    // Инициализация карты
    ymaps.ready(initMap);

    function initMap() {
      try {
        // Создаем карту
        map = new ymaps.Map('map', {
          center: [53.6698, 23.8131], // Гродно
          zoom: 12,
          controls: ['zoomControl', 'fullscreenControl']
        });

        // Создаем метки
        createPlacemarks();
        
        // Настройка обработчиков
        setupEventListeners();

        console.log('✅ Яндекс.Карты загружены');

        // Автоматически строим демо-маршрут
        setTimeout(() => {
          buildRoute();
        }, 1000);

      } catch (error) {
        console.error('❌ Ошибка загрузки карты:', error);
        showError('Не удалось загрузить Яндекс.Карты. Проверьте API ключ.');
      }
    }

    // Создание меток
    function createPlacemarks() {
      // Стартовая метка
      startPlacemark = new ymaps.Placemark([53.6698, 23.8131], {
        hintContent: 'Точка отправления',
        balloonContent: 'Укажите адрес отправления'
      }, {
        preset: 'islands#redIcon',
        iconColor: '#667eea'
      });

      // Конечная метка
      endPlacemark = new ymaps.Placemark([53.7098, 23.8131], {
        hintContent: 'Точка доставки',
        balloonContent: 'Укажите адрес доставки'
      }, {
        preset: 'islands#greenIcon',
        iconColor: '#10b981'
      });

      // Добавляем метки на карту
      map.geoObjects.add(startPlacemark);
      map.geoObjects.add(endPlacemark);
    }

    // Настройка обработчиков событий
    function setupEventListeners() {
      // Построить маршрут
      document.getElementById('build-route').addEventListener('click', buildRoute);
      
      // Изменение типа маршрута
      document.getElementById('route-type').addEventListener('change', function() {
        if (multiRoute) {
          buildRoute();
        }
      });
      
      // Enter в полях ввода
      document.getElementById('start-point').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') buildRoute();
      });
      
      document.getElementById('end-point').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') buildRoute();
      });
    }

    // Показать загрузчик
    function showLoader(text) {
      const loader = document.getElementById('loader');
      const loaderText = document.getElementById('loader-text');
      
      loaderText.textContent = text || 'Загрузка...';
      loader.style.display = 'flex';
    }

    // Скрыть загрузчик
    function hideLoader() {
      document.getElementById('loader').style.display = 'none';
    }

    // Показать ошибку
    function showError(message) {
      alert('❌ ' + message);
    }

    // Построить маршрут
    async function buildRoute() {
      const startAddress = document.getElementById('start-point').value.trim();
      const endAddress = document.getElementById('end-point').value.trim();
      const routeType = document.getElementById('route-type').value;

      // Проверка ввода
      if (!startAddress || !endAddress) {
        showError('Введите обе точки маршрута');
        return;
      }

      showLoader('Построение маршрута...');

      try {
        // Получаем координаты для адресов
        const startResult = await geocodeAddress(startAddress);
        const endResult = await geocodeAddress(endAddress);

        if (!startResult || !endResult) {
          showError('Не удалось найти адреса');
          hideLoader();
          return;
        }

        // Обновляем метки
        updatePlacemark('start', startResult.coords, startResult.address);
        updatePlacemark('end', endResult.coords, endResult.address);

        // Удаляем старый маршрут
        if (multiRoute) {
          map.geoObjects.remove(multiRoute);
        }

        // Создаем новый маршрут
        multiRoute = new ymaps.multiRouter.MultiRoute({
          referencePoints: [
            startResult.coords,
            endResult.coords
          ],
          params: {
            routingMode: routeType
          }
        }, {
          boundsAutoApply: true,
          routeActiveStrokeWidth: 4,
          routeActiveStrokeColor: '#667eea',
          routeActiveStrokeStyle: 'solid'
        });

        // Добавляем маршрут на карту
        map.geoObjects.add(multiRoute);

        // Обработка успешного построения
        multiRoute.model.events.add('requestsuccess', function() {
          updateRouteInfo();
          hideLoader();
          updateProgress();
        });

        // Обработка ошибки
        multiRoute.model.events.add('requestfail', function() {
          showError('Не удалось построить маршрут');
          hideLoader();
        });

      } catch (error) {
        console.error('Ошибка построения маршрута:', error);
        showError('Ошибка при построении маршрута');
        hideLoader();
      }
    }

    // Геокодирование адреса
    function geocodeAddress(address) {
      return new Promise((resolve) => {
        ymaps.geocode(address, {
          results: 1
        }).then(function(res) {
          const geoObject = res.geoObjects.get(0);
          
          if (geoObject) {
            resolve({
              coords: geoObject.geometry.getCoordinates(),
              address: geoObject.getAddressLine()
            });
          } else {
            resolve(null);
          }
        }, function() {
          resolve(null);
        });
      });
    }

    // Обновить метку
    function updatePlacemark(pointType, coords, address) {
      const placemark = pointType === 'start' ? startPlacemark : endPlacemark;
      
      placemark.geometry.setCoordinates(coords);
      placemark.properties.set({
        balloonContent: address,
        hintContent: address
      });
    }

    // Обновить информацию о маршруте
    function updateRouteInfo() {
      if (!multiRoute) return;
      
      try {
        const routes = multiRoute.getRoutes();
        if (routes && routes.length > 0) {
          const route = routes.get(0);
          const properties = route.properties.getAll();

          // Обновляем расстояние и время
          if (properties.distance && properties.duration) {
            document.getElementById('distance').textContent = properties.distance.text;
            document.getElementById('duration').textContent = properties.duration.text;
            
            // Показываем блок с информацией
            document.getElementById('route-info').classList.add('active');
          }
        }
      } catch (error) {
        console.log('Не удалось обновить информацию о маршруте');
      }
    }

    // Обновить прогресс
    function updateProgress() {
      const durationText = document.getElementById('duration').textContent;
      const progressFill = document.querySelector('.progress-fill');
      const progressText = document.getElementById('progress-text');
      const statusText = document.getElementById('status-text');
      
      // Логика определения прогресса на основе времени
      let progress = 70;
      let status = 'Курьер в пути';
      
      if (durationText.includes('ч')) {
        const hours = parseInt(durationText);
        if (hours > 2) {
          progress = 30;
          status = 'Заказ собирается';
        } else if (hours > 1) {
          progress = 50;
          status = 'Курьер выехал';
        }
      } else if (durationText.includes('мин') && parseInt(durationText) < 30) {
        progress = 90;
        status = 'Курьер скоро прибудет';
      }
      
      // Анимация изменения прогресса
      progressFill.style.width = progress + '%';
      progressText.textContent = progress + '%';
      statusText.textContent = status;
    }

    // Очистить маршрут
    function clearRoute() {
      document.getElementById('start-point').value = '';
      document.getElementById('end-point').value = '';
      document.getElementById('distance').textContent = '—';
      document.getElementById('duration').textContent = '—';
      
      // Сбрасываем метки
      startPlacemark.geometry.setCoordinates([53.9, 27.5667]);
      endPlacemark.geometry.setCoordinates([53.9, 27.6667]);
      
      // Удаляем маршрут
      if (multiRoute) {
        map.geoObjects.remove(multiRoute);
        multiRoute = null;
      }
      
      // Скрываем информацию
      document.getElementById('route-info').style.display = 'none';
      
      // Сбрасываем прогресс
      const progressFill = document.querySelector('.progress-fill');
      const progressText = document.querySelector('.progress-text');
      const statusText = document.getElementById('status-text');
      
      progressFill.style.width = '70%';
      progressText.textContent = 'Прогресс: 70%';
      statusText.textContent = 'Курьер в пути';
      
      // Центрируем карту
      map.setCenter([53.6698, 23.8131], 12);
    }

    // Инициализация при загрузке
    document.addEventListener('DOMContentLoaded', function() {
      console.log('Страница загружена');
    });
  </script>
</body>
</html>
