<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отследить заказ | Доставка</title>
  <meta name="description" content="Отслеживайте статус вашей доставки в реальном времени">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #000000;
      color: #ffffff;
      min-height: 100vh;
      padding: 48px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 60px;
      letter-spacing: -0.02em;
      animation: fadeInDown 0.6s ease-out;
    }

    .content {
      display: flex;
      gap: 80px;
      align-items: flex-start;
    }

    /* Timeline Styles */
    .timeline {
      flex: 1;
    }

    .timeline-step {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      position: relative;
      padding-bottom: 40px;
      animation: fadeInLeft 0.5s ease-out backwards;
    }

    .timeline-step:nth-child(1) { animation-delay: 0.1s; }
    .timeline-step:nth-child(2) { animation-delay: 0.2s; }
    .timeline-step:nth-child(3) { animation-delay: 0.3s; }
    .timeline-step:nth-child(4) { animation-delay: 0.4s; }
    .timeline-step:nth-child(5) { animation-delay: 0.5s; }

    .timeline-step:last-child {
      padding-bottom: 0;
    }

    .timeline-step:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 16px;
      top: 40px;
      width: 2px;
      height: calc(100% - 40px);
      background: linear-gradient(180deg, #444444, #222222);
    }

    .timeline-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .timeline-icon svg {
      width: 28px;
      height: 28px;
      stroke: #ffffff;
      stroke-width: 1.5;
      fill: none;
    }

    .timeline-icon--check svg {
      stroke: #22c55e;
      stroke-width: 2.5;
    }

    .timeline-text {
      font-size: 1.125rem;
      font-weight: 400;
      padding-top: 4px;
      color: #e5e5e5;
      transition: color 0.3s ease;
    }

    .timeline-step:hover .timeline-text {
      color: #ffffff;
    }

    /* Rating Card Styles */
    .rating-card {
      width: 300px;
      background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.05);
      animation: fadeInRight 0.6s ease-out 0.3s backwards;
    }

    .rating-card-title {
      font-size: 1.125rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
      color: #ffffff;
    }

    .stars-container {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .star {
      width: 36px;
      height: 36px;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .star:hover {
      transform: scale(1.15);
    }

    .star svg {
      width: 100%;
      height: 100%;
    }

    .star--active svg {
      fill: #fbbf24;
      filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.5));
    }

    .star--inactive svg {
      fill: #1f1f1f;
      stroke: #333333;
      stroke-width: 1;
    }

    .buttons-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 50px;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s ease;
      border: none;
      outline: none;
    }

    .btn--primary {
      background: linear-gradient(135deg, #ffffff, #e5e5e5);
      color: #0a0a0a;
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
    }

    .btn--primary:hover {
      background: linear-gradient(135deg, #f5f5f5, #d4d4d4);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.15);
    }

    .btn--primary:active {
      transform: translateY(0);
    }

    .btn--secondary {
      background: transparent;
      color: #ffffff;
      border: 1.5px solid #404040;
    }

    .btn--secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: #666666;
      transform: translateY(-2px);
    }

    .btn--secondary:active {
      transform: translateY(0);
    }

    /* Animations */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeInRight {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      body {
        padding: 24px;
      }

      .page-title {
        font-size: 1.75rem;
        margin-bottom: 40px;
      }

      .content {
        flex-direction: column;
        gap: 48px;
      }

      .rating-card {
        width: 100%;
        max-width: 360px;
      }

      .timeline-text {
        font-size: 1rem;
      }
    }

    /* Hover effects for desktop */
    @media (hover: hover) {
      .timeline-step {
        transition: transform 0.2s ease;
      }

      .timeline-step:hover {
        transform: translateX(8px);
      }
    }
  </style>
</head>
<body class="page-tracking">
  <div class="container">
    <h1 class="page-title">Отследить заказ</h1>

    <div class="content">
      <!-- Timeline -->
      <div class="timeline">
        <div class="timeline-step">
          <div class="timeline-icon">
           <svg width="106" height="106" viewBox="0 0 106 106" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M17.6667 79.4998L30.9167 17.6665M88.3334 79.4998L75.0834 17.6665M53 48.5832V39.7498M53 26.4998V17.6665" stroke="white" stroke-width="2" stroke-linecap="round"/>
<path d="M40.4479 86.3017L49.8024 66.4179C50.8226 64.2537 51.335 63.1672 52.0328 62.8271C52.3341 62.6803 52.6649 62.604 53 62.604C53.3352 62.604 53.666 62.6803 53.9673 62.8271C54.6651 63.1672 55.1775 64.2493 56.1977 66.4179L65.5522 86.3017C67.0848 89.5568 67.8489 91.1865 67.5618 92.0345C67.4378 92.3942 67.2231 92.7157 66.9383 92.968C66.6536 93.2203 66.3085 93.3947 65.9365 93.4744C65.062 93.6643 63.5382 92.7103 60.4819 90.8023L54.8727 87.2954C54.1925 86.8714 53.8569 86.6594 53.4903 86.5755C53.1676 86.502 52.8325 86.502 52.5098 86.5755C52.1476 86.6594 51.8031 86.8714 51.1274 87.2954L45.5182 90.8023C42.4619 92.7103 40.9381 93.6643 40.0636 93.4744C39.6916 93.3947 39.3465 93.2203 39.0618 92.968C38.777 92.7157 38.5622 92.3942 38.4383 92.0345C38.1468 91.1865 38.9153 89.5612 40.4479 86.3017Z" fill="white"/>
</svg>

          </div>
          <span class="timeline-text">Водитель начал поездку</span>
        </div>

        <div class="timeline-step">
          <div class="timeline-icon">
            <svg viewBox="0 0 24 24">
              <path d="M14 6V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h6"/>
              <path d="M18 12h-4v4h4"/>
              <circle cx="8" cy="20" r="2"/>
            </svg>
          </div>
          <span class="timeline-text">Груз передан водителю</span>
        </div>

        <div class="timeline-step">
          <div class="timeline-icon">
            <svg viewBox="0 0 24 24">
              <path d="M1 3h15v13H1z"/>
              <path d="M16 8h4l3 3v5h-7V8z"/>
              <circle cx="5.5" cy="18.5" r="2.5"/>
              <circle cx="18.5" cy="18.5" r="2.5"/>
            </svg>
          </div>
          <span class="timeline-text">Водитель в пути</span>
        </div>

        <div class="timeline-step">
          <div class="timeline-icon">
            <svg viewBox="0 0 24 24">
              <path d="M12 21c0 0-8-6.5-8-12a8 8 0 1 1 16 0c0 5.5-8 12-8 12z"/>
              <circle cx="12" cy="9" r="3" fill="#ffffff"/>
            </svg>
          </div>
          <span class="timeline-text">Водитель прибыл</span>
        </div>

        <div class="timeline-step">
          <div class="timeline-icon timeline-icon--check">
            <svg viewBox="0 0 24 24">
              <path d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <span class="timeline-text">Доставлено</span>
        </div>
      </div>

      <!-- Rating Card -->
      <div class="rating-card">
        <h2 class="rating-card-title">Оценить доставку</h2>

        <div class="stars-container">
          <div class="star star--active">
            <svg viewBox="0 0 24 24">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </div>
          <div class="star star--active">
            <svg viewBox="0 0 24 24">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </div>
          <div class="star star--active">
            <svg viewBox="0 0 24 24">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </div>
          <div class="star star--active">
            <svg viewBox="0 0 24 24">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </div>
          <div class="star star--inactive">
            <svg viewBox="0 0 24 24">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </div>
        </div>

        <div class="buttons-container">
          <button class="btn btn--primary">Не назначать этого водителя</button>
          <button class="btn btn--secondary">Оставить отзыв</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Интерактивность для звёзд
    const stars = document.querySelectorAll('.star');
    
    stars.forEach((star, index) => {
      star.addEventListener('click', () => {
        stars.forEach((s, i) => {
          if (i <= index) {
            s.classList.remove('star--inactive');
            s.classList.add('star--active');
          } else {
            s.classList.remove('star--active');
            s.classList.add('star--inactive');
          }
        });
      });

      star.addEventListener('mouseenter', () => {
        stars.forEach((s, i) => {
          if (i <= index) {
            s.style.transform = 'scale(1.1)';
          }
        });
      });

      star.addEventListener('mouseleave', () => {
        stars.forEach(s => {
          s.style.transform = '';
        });
      });
    });

    // Кнопки
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', function() {
        this.style.animation = 'pulse 0.3s ease';
        setTimeout(() => {
          this.style.animation = '';
        }, 300);
      });
    });
  </script>
</body>
</html>
