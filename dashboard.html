<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 { margin-top: 0; }
        .user-info {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .info-item {
            margin: 10px 0;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .label {
            font-weight: bold;
            display: inline-block;
            width: 120px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Личный кабинет</h1>
        <div id="userInfo" class="user-info">
            <p>Загрузка данных...</p>
        </div>
        <button onclick="logout()">Выйти</button>
    </div>

    <script>
        // Загружаем данные пользователя
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const token = localStorage.getItem('token');
        
        console.log('Данные из localStorage:', { user, token });
        
        if (!token || !user.name) {
            window.location.href = '/index.html';
        } else {
            const userInfo = document.getElementById('userInfo');
            userInfo.innerHTML = `
                <div class="info-item"><span class="label">Имя:</span> ${user.name}</div>
                <div class="info-item"><span class="label">Email:</span> ${user.email}</div>
                <div class="info-item"><span class="label">ID:</span> ${user.id}</div>
            `;
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
